<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family:Arial,sans-serif;
    overflow:hidden;
}

.box{
    background:white;
    padding:35px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    width:90%;
    max-width:450px;
    animation:fadeIn 1s;
}

h1{
    color:#ff4081;
    margin-bottom:15px;
}

h2{
    color:#e91e63;
    margin:10px 0;
}

p{
    font-size:18px;
    color:#444;
    margin:10px 0;
    line-height:1.6;
}

button{
    margin-top:20px;
    padding:12px 30px;
    border:none;
    border-radius:30px;
    background:#ff4081;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#e91e63;
    transform:scale(1.05);
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:scale(.8);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}
</style>
</head>

<body>

<!-- First Page -->
<div class="box" id="page1">
    <h1>🎁 A Surprise For You ❤️</h1>
    <p>Someone has a special message for you.</p>
    <button onclick="showWish()">Open Surprise 🎉</button>
</div>

<!-- Second Page -->
<div class="box" id="page2" style="display:none;">
    <h1>🎂 Happy Birthday 🎉</h1>
    <h2>Dear kaku,</h2>

    <p>
        Wishing you a day filled with happiness,
        love, laughter and unforgettable memories.
    </p>

    <p>
        May Allah bless you with good health,
        endless success, peace and countless smiles.
    </p>

    <h2>❤️ Happy Birthday Once Again! ❤️</h2>
</div>

<!-- Background Music -->
<audio id="bgMusic" loop>
    <source src="birthday.mp3" type="audio/mpeg">
</audio>

<script>
function showWish(){

    document.getElementById("page1").style.display="none";
    document.getElementById("page2").style.display="block";

    var music=document.getElementById("bgMusic");
    music.play();
}
</script>

</body>
</html>
